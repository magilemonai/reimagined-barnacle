<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valisar: Shadows of the Eldspyre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="controls-hint">
            <span>[Arrow Keys] Move</span>
            <span>[Z] Attack / Confirm</span>
            <span>[X] Special Ability</span>
            <span>[Enter] Start / Menu</span>
        </div>
    </div>
    <!-- Load order matters: engine first, then systems, then game orchestrator last -->
    <script src="src/engine.js"></script>
    <script src="src/sprites.js"></script>
    <script src="src/maps.js"></script>
    <script src="src/dialogue.js"></script>
    <script src="src/entities.js"></script>
    <script src="src/game.js"></script>
</body>
</html>
